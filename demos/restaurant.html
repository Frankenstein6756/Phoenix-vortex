<title>Restaurant Demo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111;
    color:white;
}

header{
    background:#ff6b00;
    padding:20px;
    text-align:center;
}

.hero{
    padding:100px 20px;
    text-align:center;
}

.btn{
    display:inline-block;
    background:#ff6b00;
    color:white;
    padding:15px 30px;
    margin-top:20px;
    text-decoration:none;
    border-radius:10px;
}

.menu{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#222;
    padding:30px;
    border-radius:15px;
}

</style>

    <div id="chat-header">Phoenix AI</div>

    <p>

    </p>

    </a>

</section>

<section class="menu">

        <h2>Pizza</h2>
